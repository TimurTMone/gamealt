<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>BabyPath</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{
            --bg:#fef9f0;--surface:#fff;--primary:#6366f1;--primary-light:#818cf8;--primary-bg:#eef2ff;
            --green:#10b981;--green-bg:#ecfdf5;--pink:#ec4899;--pink-bg:#fdf2f8;
            --warm:#f59e0b;--warm-bg:#fffbeb;--text:#1e293b;--text2:#64748b;--border:#e2e8f0;
            --radius:16px;--radius-sm:12px;
            --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
            --safe-left:env(safe-area-inset-left,0px);--safe-right:env(safe-area-inset-right,0px);
        }
        body{
            background:var(--bg);color:var(--text);font-family:'Nunito',-apple-system,sans-serif;
            min-height:100vh;min-height:100dvh;
            padding-top:var(--safe-top);padding-bottom:calc(var(--safe-bottom) + 68px);
            padding-left:var(--safe-left);padding-right:var(--safe-right);
            -webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;
            overscroll-behavior-y:contain;-webkit-overflow-scrolling:touch;
        }
        /* --- ONBOARDING OVERLAY --- */
        .onboarding{position:fixed;inset:0;z-index:1000;background:var(--bg);display:flex;flex-direction:column;
            padding:var(--safe-top) var(--safe-left) var(--safe-bottom) var(--safe-right);transition:opacity .3s}
        .onboarding.hidden{opacity:0;pointer-events:none}
        .ob-content{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}
        .ob-emoji{font-size:80px;margin-bottom:16px;animation:ob-float 3s ease-in-out infinite}
        @keyframes ob-float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
        .ob-title{font-size:28px;font-weight:900;margin-bottom:8px}
        .ob-title span{background:linear-gradient(135deg,var(--primary),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .ob-sub{font-size:15px;color:var(--text2);line-height:1.5;max-width:300px;margin:0 auto}
        .ob-form{width:100%;max-width:340px;margin:20px auto 0;text-align:left}
        .ob-label{font-size:13px;font-weight:800;margin-bottom:6px;color:var(--text2)}
        .ob-input{width:100%;padding:14px 16px;border:2px solid var(--border);border-radius:var(--radius-sm);
            font-size:16px;font-family:inherit;font-weight:600;background:var(--surface);color:var(--text);
            appearance:none;-webkit-appearance:none;outline:none;margin-bottom:16px}
        .ob-input:focus{border-color:var(--primary)}
        .ob-lang-grid{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
        .ob-lang-btn{flex:1;min-width:90px;padding:14px 8px;border:2px solid var(--border);border-radius:var(--radius-sm);
            background:var(--surface);font-size:14px;font-weight:800;text-align:center;cursor:pointer;
            transition:all .15s;min-height:44px}
        .ob-lang-btn.sel{border-color:var(--primary);background:var(--primary-bg);color:var(--primary)}
        .ob-lang-btn:active{transform:scale(.96)}
        .ob-dots{display:flex;gap:8px;justify-content:center;margin-top:20px}
        .ob-dot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:all .2s}
        .ob-dot.active{background:var(--primary);width:24px;border-radius:4px}
        .ob-actions{padding:16px 24px;display:flex;gap:12px}
        .ob-btn{flex:1;padding:16px;border-radius:var(--radius-sm);font-size:16px;font-weight:800;
            border:none;cursor:pointer;min-height:52px;transition:transform .1s;font-family:inherit}
        .ob-btn:active{transform:scale(.97)}
        .ob-btn-primary{background:var(--primary);color:#fff}
        .ob-btn-skip{background:transparent;color:var(--text2)}
        .ob-features{display:flex;flex-direction:column;gap:12px;margin-top:16px;width:100%;max-width:300px}
        .ob-feat{display:flex;align-items:center;gap:12px;text-align:left;padding:12px 16px;
            background:var(--surface);border-radius:var(--radius-sm);border:1px solid var(--border)}
        .ob-feat-icon{font-size:28px;flex-shrink:0}
        .ob-feat-text{font-size:14px;font-weight:700;line-height:1.3}
        /* --- TAB VIEWS --- */
        .view{display:none;animation:fadeIn .2s}
        .view.active{display:block}
        @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
        /* --- HEADER --- */
        .header{padding:20px 20px 0}
        .header-greeting{font-size:14px;color:var(--text2);font-weight:700}
        .header-title{font-size:22px;font-weight:900;margin-top:2px}
        .header-title span{background:linear-gradient(135deg,var(--primary),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        /* --- STREAK --- */
        .streak-bar{display:flex;align-items:center;gap:10px;margin:16px 20px 0;padding:14px 16px;
            background:linear-gradient(135deg,#fef3c7,#fde68a);border-radius:var(--radius);
            border:1px solid #fbbf24}
        .streak-fire{font-size:28px;transition:transform .3s}
        .streak-info{flex:1}
        .streak-count{font-size:16px;font-weight:900;color:#92400e}
        .streak-sub{font-size:11px;color:#a16207;font-weight:600}
        /* --- DAILY WORD CARD --- */
        .daily-word{margin:16px 20px 0;background:var(--surface);border-radius:var(--radius);
            border:1px solid var(--border);overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.04)}
        .dw-header{padding:14px 16px 0;display:flex;justify-content:space-between;align-items:center}
        .dw-badge{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--primary)}
        .dw-stage{font-size:10px;font-weight:700;color:var(--text2);background:var(--primary-bg);
            padding:3px 10px;border-radius:8px}
        .dw-body{padding:16px;text-align:center}
        .dw-emoji{font-size:56px;margin-bottom:8px}
        .dw-words{display:flex;flex-direction:column;gap:4px;margin-bottom:8px}
        .dw-word{font-size:20px;font-weight:900}
        .dw-word-alt{font-size:14px;color:var(--text2);font-weight:700}
        .dw-target{display:inline-block;font-size:11px;font-weight:800;padding:3px 10px;
            border-radius:8px;background:var(--warm-bg);color:var(--warm);margin:8px 0}
        .dw-tip{font-size:12px;color:var(--text2);line-height:1.5;margin-top:8px;padding:10px 12px;
            background:var(--bg);border-radius:var(--radius-sm)}
        .dw-actions{display:flex;gap:10px;padding:0 16px 16px;justify-content:center}
        .dw-btn{flex:1;padding:12px;border-radius:var(--radius-sm);font-size:14px;font-weight:800;
            border:none;cursor:pointer;min-height:44px;transition:transform .1s;font-family:inherit;max-width:180px}
        .dw-btn:active{transform:scale(.96)}
        .dw-btn-hear{background:var(--primary);color:#fff}
        .dw-btn-practice{background:var(--green);color:#fff}
        /* --- QUICK ACTIONS --- */
        .section-label{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;
            color:var(--text2);padding:20px 20px 10px}
        .quick-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 20px}
        .q-card{background:var(--surface);border-radius:var(--radius);padding:18px 14px;
            text-decoration:none;color:inherit;border:1px solid var(--border);display:flex;flex-direction:column;
            align-items:center;gap:6px;text-align:center;transition:transform .1s;position:relative}
        .q-card:active{transform:scale(.96)}
        .q-icon{font-size:36px}
        .q-name{font-size:14px;font-weight:800}
        .q-sub{font-size:11px;color:var(--text2)}
        .q-badge{position:absolute;top:10px;right:10px;font-size:9px;font-weight:800;padding:2px 8px;
            border-radius:8px;color:#fff}
        .q-badge-new{background:var(--pink)}
        .q-badge-free{background:var(--green)}
        .q-progress{width:60%;height:4px;background:var(--border);border-radius:2px;margin-top:4px}
        .q-progress-fill{height:100%;border-radius:2px;background:var(--primary);transition:width .3s}
        /* --- GUIDES HORIZONTAL SCROLL --- */
        .guides-scroll{display:flex;gap:12px;padding:0 20px;overflow-x:auto;-webkit-overflow-scrolling:touch;
            scroll-snap-type:x mandatory;scrollbar-width:none}
        .guides-scroll::-webkit-scrollbar{display:none}
        .guide-card{flex-shrink:0;width:150px;background:var(--surface);border-radius:var(--radius);
            border:1px solid var(--border);padding:16px;text-align:center;scroll-snap-align:start;
            text-decoration:none;color:inherit;transition:transform .1s}
        .guide-card:active{transform:scale(.96)}
        .guide-card .gc-icon{font-size:32px;margin-bottom:8px}
        .guide-card .gc-title{font-size:12px;font-weight:800;line-height:1.3;margin-bottom:10px;
            display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
        .guide-card .gc-btn{font-size:11px;font-weight:800;color:var(--primary);padding:6px 14px;
            border-radius:8px;background:var(--primary-bg);display:inline-block}
        /* --- DAILY TIP --- */
        .daily-tip{margin:0 20px 20px;padding:16px;background:var(--surface);border-radius:var(--radius);
            border:1px solid var(--border);display:flex;gap:12px;align-items:flex-start}
        .dt-icon{font-size:28px;flex-shrink:0}
        .dt-body{flex:1}
        .dt-label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--warm);margin-bottom:4px}
        .dt-text{font-size:13px;line-height:1.6;color:var(--text)}
        /* --- PROGRESS TAB --- */
        .prog-section{padding:0 20px}
        .prog-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px}
        .prog-stat{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);
            padding:16px 10px;text-align:center}
        .ps-num{font-size:24px;font-weight:900}
        .ps-label{font-size:10px;font-weight:700;color:var(--text2);margin-top:2px}
        .prog-chart{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);
            padding:16px;margin-bottom:16px}
        .pc-title{font-size:14px;font-weight:800;margin-bottom:14px}
        .pc-bars{display:flex;align-items:flex-end;gap:8px;height:100px}
        .pc-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
        .pc-bar{width:100%;border-radius:6px 6px 0 0;background:var(--primary-bg);min-height:4px;
            transition:height .5s cubic-bezier(.34,1.56,.64,1)}
        .pc-bar.filled{background:var(--primary)}
        .pc-day{font-size:10px;font-weight:700;color:var(--text2)}
        .prog-streak{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);
            padding:16px;text-align:center;margin-bottom:16px}
        .prog-streak .ps-big{font-size:48px;font-weight:900;color:var(--primary)}
        .prog-streak .ps-sub{font-size:14px;color:var(--text2);font-weight:700}
        /* --- SHARE TAB --- */
        .share-section{padding:20px}
        .share-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);
            padding:24px;text-align:center;margin-bottom:16px}
        .share-emoji{font-size:48px;margin-bottom:12px}
        .share-title{font-size:18px;font-weight:900;margin-bottom:6px}
        .share-sub{font-size:13px;color:var(--text2);line-height:1.5;margin-bottom:16px}
        .share-btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 28px;
            border-radius:var(--radius-sm);font-size:15px;font-weight:800;border:none;cursor:pointer;
            min-height:48px;transition:transform .1s;font-family:inherit;width:100%}
        .share-btn:active{transform:scale(.97)}
        .share-btn-primary{background:var(--primary);color:#fff}
        .share-btn-green{background:var(--green);color:#fff}
        .share-btn-pink{background:var(--pink);color:#fff}
        .share-btn-outline{background:transparent;border:2px solid var(--border);color:var(--text)}
        /* --- SETTINGS TAB --- */
        .settings{padding:20px}
        .setting-group{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);
            overflow:hidden;margin-bottom:16px}
        .setting-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;
            border-bottom:1px solid #f5f5f5;font-size:14px;font-weight:600;min-height:48px;cursor:pointer;
            transition:background .1s}
        .setting-row:last-child{border:none}
        .setting-row:active{background:var(--bg)}
        .sr-left{display:flex;align-items:center;gap:10px}
        .sr-icon{font-size:20px}
        .sr-arrow{color:#ccc;font-size:16px}
        .sr-value{font-size:13px;color:var(--text2);font-weight:700}
        .lang-pills{display:flex;gap:8px}
        .lang-pill{padding:8px 16px;border-radius:20px;border:2px solid var(--border);background:var(--surface);
            font-size:13px;font-weight:700;cursor:pointer;min-height:36px;transition:all .15s}
        .lang-pill.active{background:var(--primary);color:#fff;border-color:var(--primary)}
        .lang-pill:active{transform:scale(.95)}
        .multi-lang-pills .lang-pill.active{background:var(--green);border-color:var(--green)}
        .pro-card{background:linear-gradient(135deg,var(--primary),var(--pink));border-radius:var(--radius);
            padding:20px;color:#fff;text-align:center;margin-bottom:16px}
        .pro-card h3{font-size:18px;font-weight:900;margin-bottom:6px}
        .pro-card p{font-size:12px;opacity:.9;line-height:1.5;margin-bottom:12px}
        .pro-features{text-align:left;margin-bottom:14px}
        .pro-feat{font-size:12px;font-weight:700;padding:3px 0}
        .pro-btn{background:#fff;color:var(--primary);border:none;padding:12px 24px;border-radius:var(--radius-sm);
            font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;min-height:44px}
        .pro-btn:active{transform:scale(.97)}
        .app-version{text-align:center;font-size:12px;color:var(--text2);padding:20px}
        /* --- EDIT MODAL --- */
        .modal-overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.4);display:none;
            align-items:flex-end;justify-content:center;animation:fadeIn .2s}
        .modal-overlay.show{display:flex}
        .modal{background:var(--bg);border-radius:20px 20px 0 0;width:100%;max-width:480px;
            padding:24px 20px calc(var(--safe-bottom) + 20px);max-height:80vh;overflow-y:auto}
        .modal h3{font-size:18px;font-weight:900;margin-bottom:16px;text-align:center}
        .modal-close{display:block;width:100%;padding:14px;border-radius:var(--radius-sm);font-size:15px;
            font-weight:800;border:none;cursor:pointer;margin-top:12px;font-family:inherit;
            background:var(--primary);color:#fff;min-height:48px}
        .modal-close:active{transform:scale(.97)}
        /* --- TAB BAR --- */
        .tab-bar{position:fixed;bottom:0;left:0;width:100%;background:var(--surface);
            border-top:1px solid var(--border);display:flex;padding-bottom:var(--safe-bottom);z-index:100}
        .tab{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 0 6px;
            font-size:10px;font-weight:700;color:var(--text2);cursor:pointer;border:none;background:none;
            min-height:50px;transition:color .15s;font-family:inherit;-webkit-tap-highlight-color:transparent}
        .tab.active{color:var(--primary)}
        .tab .tab-icon{font-size:22px;margin-bottom:2px;transition:transform .15s}
        .tab.active .tab-icon{transform:scale(1.1)}
        /* --- TOGGLE --- */
        .toggle{width:48px;height:28px;border-radius:14px;background:var(--border);position:relative;
            cursor:pointer;transition:background .2s;flex-shrink:0}
        .toggle.on{background:var(--green)}
        .toggle::after{content:'';position:absolute;top:3px;left:3px;width:22px;height:22px;
            border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.15)}
        .toggle.on::after{transform:translateX(20px)}
    </style>
</head>
<body>

<!-- ===== ONBOARDING ===== -->
<div class="onboarding" id="onboarding">
    <div class="ob-content" id="ob-content"></div>
    <div class="ob-dots"><div class="ob-dot active"></div><div class="ob-dot"></div><div class="ob-dot"></div></div>
    <div class="ob-actions" id="ob-actions"></div>
</div>

<!-- ===== HOME TAB ===== -->
<div class="view" id="view-home">
    <div class="header">
        <div class="header-greeting" id="home-greeting"></div>
        <div class="header-title" id="home-title"></div>
    </div>
    <div id="streak-container"></div>
    <div id="daily-word-container"></div>
    <div class="section-label">Quick Actions</div>
    <div class="quick-grid" id="quick-actions"></div>
    <div class="section-label">Guides</div>
    <div class="guides-scroll" id="guides-scroll"></div>
    <div class="section-label">Daily Tip</div>
    <div id="daily-tip-container"></div>
</div>

<!-- ===== PROGRESS TAB ===== -->
<div class="view" id="view-progress">
    <div class="header"><div class="header-title">Your Progress</div></div>
    <div class="section-label">Overview</div>
    <div class="prog-section" id="progress-content"></div>
</div>

<!-- ===== SHARE TAB ===== -->
<div class="view" id="view-share">
    <div class="header"><div class="header-title">Share & Grow</div></div>
    <div class="share-section" id="share-content"></div>
</div>

<!-- ===== SETTINGS TAB ===== -->
<div class="view" id="view-settings">
    <div class="header"><div class="header-title">Settings</div></div>
    <div class="settings" id="settings-content"></div>
</div>

<!-- ===== EDIT PROFILE MODAL ===== -->
<div class="modal-overlay" id="edit-modal">
    <div class="modal" id="edit-modal-body"></div>
</div>

<!-- ===== TAB BAR ===== -->
<div class="tab-bar" id="tab-bar">
    <button class="tab active" data-tab="home"><div class="tab-icon">&#x1F3E0;</div>Home</button>
    <button class="tab" data-tab="progress"><div class="tab-icon">&#x1F4C8;</div>Progress</button>
    <button class="tab" data-tab="share"><div class="tab-icon">&#x1F517;</div>Share</button>
    <button class="tab" data-tab="settings"><div class="tab-icon">&#x2699;&#xFE0F;</div>Settings</button>
</div>

const TIPS = ["Talk to your baby during everyday routines. Narrate diaper changes, meals, and walks.","Respond to ALL sounds your baby makes. This teaches them that communication matters.","Read to your baby every day \u2014 even 5 minutes makes a difference for language development.","Get face-to-face with your baby when speaking. They learn by watching your mouth move.","Use 'parentese' \u2014 that sing-song voice. Research shows babies learn faster from it.","Wait 5 seconds after asking a question. Give your baby time to process and respond.","Label everything! 'Look, a dog! The dog is big! Hi dog!' \u2014 repetition is key.","Follow your child's lead. Talk about what THEY are interested in.","Sing songs with hand motions. Music activates language areas in the brain.","Reduce screen time before age 2. Live interaction beats any app for language learning.","Bilingual exposure doesn't cause speech delays. It's a gift for their brain!","Point to things as you name them. Joint attention is crucial for word learning.","Use the '+1 rule': add one word to whatever your child says. 'Ball' \u2192 'Big ball!'","Give choices: 'Want milk or water?' This motivates communication.","Pretend play boosts language. Have a tea party, play doctor, cook together.","Don't correct pronunciation directly. Instead, model the correct form: 'Tat!' \u2192 'Yes, cat!'","Eye contact during communication builds social-emotional AND language skills.","Bath time is language time! Name body parts, actions, and toys.","Mealtime vocab: hot, cold, more, all done, yummy, spoon, cup. Repeat every meal.","If your child points, they're communicating! Label what they point at every time.","Pausing in familiar songs teaches anticipation. 'Twinkle twinkle little...' wait for them!","Toddlers understand 3x more words than they can say. Comprehension comes first.","Walking and talking develop together. Movement activities boost language.","Name emotions: 'You're sad. You wanted the toy.' This builds emotional vocabulary.","Animal sounds count as words! 'Moo', 'woof', 'baa' are real communication.","Turn off background TV. It reduces parent-child conversation by up to 20%.","Go outside! New environments provide new vocabulary opportunities.","Stacking blocks? 'Up! Up! Up! Fall DOWN!' \u2014 simple words in fun contexts.","Gesture + word = faster learning. Point while naming to boost understanding.","Bedtime routines teach sequence words: first, then, after, last. Predictability helps.","Play peekaboo! It teaches object permanence AND social communication.","Let your toddler 'help' with chores. Folding, stirring, pouring = vocab gold.","Worry less about the number of words. Focus on whether they COMMUNICATE (gestures count!).","Board books with flaps and textures engage multiple senses during reading.","Repetitive books (like 'Brown Bear') help children predict and fill in words."];

//  STATE

let profile = null;
let currentTab = 'home';

function getProfile() {
    if (!profile) profile = JSON.parse(localStorage.getItem('babypath_profile') || 'null');
    return profile;
}

function saveProfile(p) {
    profile = p;
    localStorage.setItem('babypath_profile', JSON.stringify(p));
}

function getBabyAgeMonths() {
    const p = getProfile();
    if (!p || !p.dob) return -1;
    const dob = new Date(p.dob);
    const now = new Date();
    return (now.getFullYear() - dob.getFullYear()) * 12 + (now.getMonth() - dob.getMonth());
}

function getStageForAge(months) {
    if (months < 0) return 2;
    if (months < 12) return 1;
    if (months < 18) return 2;
    if (months < 24) return 3;
    return 4;
}

function getSelectedLangs() {
    const p = getProfile();
    return (p && p.langs && p.langs.length) ? p.langs : ['en'];
}

function getTimeGreeting() {
    const h = new Date().getHours();
    if (h < 12) return 'Good morning';
    if (h < 17) return 'Good afternoon';
    return 'Good evening';
}

function getDaysSinceEpoch() {
    return Math.floor(Date.now() / 86400000);
}

// ================================================================
//  STREAK
// ================================================================
function updateStreak() {
    const today = new Date().toDateString();
    const last = localStorage.getItem('babypath_last_open');
    let streak = parseInt(localStorage.getItem('babypath_streak') || '0', 10);

    if (last === today) {
        // already counted today
    } else {
        const yesterday = new Date(Date.now() - 86400000).toDateString();
        if (last === yesterday) {
            streak++;
        } else {
            streak = 1;
        }
        localStorage.setItem('babypath_streak', streak);
        localStorage.setItem('babypath_last_open', today);
    }
    return streak;
}

function toggleObLang(el) {
    const l = el.dataset.l;
    const idx = obData.langs.indexOf(l);
    if (idx >= 0 && obData.langs.length > 1) { obData.langs.splice(idx, 1); el.classList.remove('sel'); }
    else if (idx < 0) { obData.langs.push(l); el.classList.add('sel'); }
}

function obNext() {
    if (obStep === 1) {
        const nameEl = document.getElementById('ob-name');
        const dobEl = document.getElementById('ob-dob');
        obData.name = (nameEl.value || '').trim();
        obData.dob = dobEl.value || '';
    }
    obStep++;
    renderObStep();
}

function skipOnboarding() {
    localStorage.setItem('babypath_onboarded', 'true');
    hideOnboarding();
}

function finishOnboarding() {
    saveProfile({ name: obData.name, dob: obData.dob, langs: obData.langs });
    localStorage.setItem('babypath_onboarded', 'true');
    if (obData.langs.length) localStorage.setItem('babypath_lang', obData.langs[0]);
    hideOnboarding();
}

function getBabyAgeFromDob(dob) {
    const m = getMonthsFromDob(dob);
    if (m < 0) return '';
    if (m < 12) return m + ' months old';
    const y = Math.floor(m / 12);
    const rm = m % 12;
    return y + (y === 1 ? ' year' : ' years') + (rm ? ', ' + rm + 'mo' : '') + ' old';
}

function getMonthsFromDob(dob) {
    const d = new Date(dob);
    const now = new Date();
    return (now.getFullYear() - d.getFullYear()) * 12 + (now.getMonth() - d.getMonth());
}

document.getElementById('tab-bar').addEventListener('click', function(e) {
    const tab = e.target.closest('.tab');
    if (!tab) return;
    const name = tab.dataset.tab;
    if (name === currentTab) return;
    switchTab(name);
});

function switchTab(name) {
    currentTab = name;
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-' + name).classList.add('active');
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
    // lazy render
    if (name === 'progress') renderProgress();
    if (name === 'share') renderShare();
    if (name === 'settings') renderSettings();
}

function renderDailyWord() {
    const c = document.getElementById('daily-word-container');
    const months = getBabyAgeMonths();
    const stage = getStageForAge(months);
    const stageWords = WORD_DB.filter(w => w.s === stage);
    if (!stageWords.length) { c.innerHTML = ''; return; }

    const dayIdx = getDaysSinceEpoch() % stageWords.length;
    const word = stageWords[dayIdx];
    const langs = getSelectedLangs();
    const stageLabels = {1:'Stage 1 (8-14mo)',2:'Stage 2 (12-18mo)',3:'Stage 3 (16-24mo)',4:'Stage 4 (20-30mo)'};

    let wordsHtml = '';
    if (langs.includes('en')) wordsHtml += `<div class="dw-word">${word.en}</div>`;
    if (langs.includes('ru')) wordsHtml += `<div class="${langs[0]==='ru'?'dw-word':'dw-word-alt'}">${word.ru}</div>`;
    if (langs.includes('ky')) wordsHtml += `<div class="${langs[0]==='ky'?'dw-word':'dw-word-alt'}">${word.ky}</div>`;
    if (!wordsHtml) wordsHtml = `<div class="dw-word">${word.en}</div>`;

    c.innerHTML = `<div class="daily-word">
        <div class="dw-header">
            <div class="dw-badge">&#x2B50; Word of the Day</div>
            <div class="dw-stage">${stageLabels[stage]}</div>
        </div>
        <div class="dw-body">
            <div class="dw-emoji">${word.emoji}</div>
            <div class="dw-words">${wordsHtml}</div>
            <div class="dw-target">Target sound: ${word.target}</div>
            <div class="dw-tip">&#x1F4A1; ${word.tip}</div>
        </div>
        <div class="dw-actions">
            <button class="dw-btn dw-btn-hear" onclick="hearWord()">&#x1F50A; Hear it</button>
            <a class="dw-btn dw-btn-practice" href="games/speech-buddy.html" style="text-decoration:none;text-align:center">Practice &#x2192;</a>
        </div>
    </div>`;
}

function hearWord() {
    const months = getBabyAgeMonths();
    const stage = getStageForAge(months);
    const stageWords = WORD_DB.filter(w => w.s === stage);
    if (!stageWords.length) return;
    const dayIdx = getDaysSinceEpoch() % stageWords.length;
    const word = stageWords[dayIdx];
    const langs = getSelectedLangs();
    const lang = langs[0] || 'en';
    const text = word[lang] || word.en;
    try {
        const utter = new SpeechSynthesisUtterance(text);
        utter.rate = 0.8;
        utter.pitch = 1.1;
        if (lang === 'ru') utter.lang = 'ru-RU';
        else if (lang === 'ky') utter.lang = 'ky-KG';
        else utter.lang = 'en-US';
        speechSynthesis.cancel();
        speechSynthesis.speak(utter);
    } catch (e) { /* SpeechSynthesis not supported */ }
}

function renderProgress() {
    const c = document.getElementById('progress-content');
    const progress = JSON.parse(localStorage.getItem('sb_progress') || '{}');
    const wordsLearned = Object.keys(progress).length;

    const milestones = JSON.parse(localStorage.getItem('bp_milestones') || '{}');
    const msCount = Object.keys(milestones).length;

    let cbCount = 0;
    for (let i = 0; i < 15; i++) {
        if (localStorage.getItem('cb_page_' + i)) cbCount++;
    }

    const streak = parseInt(localStorage.getItem('babypath_streak') || '0', 10);

    // Sessions this week
    const sessions = JSON.parse(localStorage.getItem('sb_sessions') || '[]');
    const now = new Date();
    const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const weekData = [];
    for (let i = 6; i >= 0; i--) {
        const d = new Date(now.getTime() - i * 86400000);
        const ds = d.toDateString();
        const count = sessions.filter(s => new Date(s.date || s.d || 0).toDateString() === ds).length;
        weekData.push({ day: dayNames[d.getDay()], count, isToday: i === 0 });
    }
    const maxSessions = Math.max(...weekData.map(d => d.count), 1);

    c.innerHTML = `
        <div class="prog-stats">
            <div class="prog-stat"><div class="ps-num" style="color:var(--primary)">${wordsLearned}</div><div class="ps-label">Words Practiced</div></div>
            <div class="prog-stat"><div class="ps-num" style="color:var(--green)">${msCount}</div><div class="ps-label">Milestones</div></div>
            <div class="prog-stat"><div class="ps-num" style="color:var(--pink)">${cbCount}</div><div class="ps-label">Pages Colored</div></div>
        </div>
        <div class="prog-chart">
            <div class="pc-title">Sessions This Week</div>
            <div class="pc-bars">
                ${weekData.map(d => `<div class="pc-bar-wrap">
                    <div class="pc-bar${d.count ? ' filled' : ''}" style="height:${d.count ? Math.max((d.count / maxSessions) * 100, 10) : 4}%"></div>
                    <div class="pc-day" style="${d.isToday ? 'color:var(--primary);font-weight:900' : ''}">${d.day}</div>
                </div>`).join('')}
            </div>
        </div>
        <div class="prog-streak">
            <div style="font-size:40px;margin-bottom:4px">&#x1F525;</div>
            <div class="ps-big">${streak}</div>
            <div class="ps-sub">Day Streak</div>
        </div>`;
}

}

function shareApp() {
    const p = getProfile();
    const name = (p && p.name) || 'my baby';
    const text = `I'm using BabyPath to help ${name} learn to talk! Free speech therapy app with 3 languages (English, Russian, Kyrgyz). Try it: https://babypath.app`;
    try {
        if (navigator.share) {
            navigator.share({ title: 'BabyPath', text: text, url: 'https://babypath.app' }).catch(() => {});
        } else {
            // Fallback: copy to clipboard
            navigator.clipboard.writeText(text).then(() => alert('Copied to clipboard!')).catch(() => alert(text));
        }
    } catch (e) {
        alert(text);
    }
}

function toggleLang(l, el) {
    const p = getProfile() || { name: '', dob: '', langs: ['en'] };
    const idx = p.langs.indexOf(l);
    if (idx >= 0 && p.langs.length > 1) {
        p.langs.splice(idx, 1);
        el.classList.remove('active');
    } else if (idx < 0) {
        p.langs.push(l);
        el.classList.add('active');
    }
    saveProfile(p);
}

function setAppLang(l) {
    localStorage.setItem('babypath_lang', l);
    renderSettings();
}

function toggleNotif(row) {
    const tog = row.querySelector('.toggle');
    const isOn = tog.classList.toggle('on');
    localStorage.setItem('babypath_notif', isOn ? 'true' : 'false');
}

// ================================================================

// ================================================================
function editProfile() {
    const modal = document.getElementById('edit-modal');
    const body = document.getElementById('edit-modal-body');
    const p = getProfile() || { name: '', dob: '', langs: ['en'] };

    body.innerHTML = `
        <h3>Edit Baby Profile</h3>
        <div class="ob-label">Baby's Name</div>
        <input class="ob-input" id="edit-name" type="text" value="${p.name || ''}" autocomplete="off">
        <div class="ob-label">Date of Birth</div>
        <input class="ob-input" id="edit-dob" type="date" value="${p.dob || ''}">
        <button class="modal-close" onclick="saveEditProfile()">Save</button>
        <button class="modal-close" style="background:transparent;color:var(--text2);margin-top:8px" onclick="closeModal()">Cancel</button>`;
    modal.classList.add('show');
}

function saveEditProfile() {
    const p = getProfile() || { name: '', dob: '', langs: ['en'] };
    p.name = (document.getElementById('edit-name').value || '').trim();
    p.dob = document.getElementById('edit-dob').value || '';
    saveProfile(p);
    closeModal();
    renderSettings();
    renderHome();
}

function closeModal() {
    document.getElementById('edit-modal').classList.remove('show');
}

document.getElementById('edit-modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
});

// ================================================================
//  INIT
// ================================================================
function renderApp() {
    document.getElementById('view-home').classList.add('active');
    renderHome();
}

(function init() {
    const onboarded = localStorage.getItem('babypath_onboarded');
    if (!onboarded) {
        document.getElementById('onboarding').style.display = 'flex';
        renderObStep();
    } else {
        document.getElementById('onboarding').style.display = 'none';
        renderApp();
    }
})();
</script>
