<!DOCTYPE html>
<html lang="en">
<head>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent; }
        :root {
            --bg: #fef6e4; --surface: #ffffff; --primary: #6366f1;
            --primary-light: #818cf8; --text: #1e293b; --text2: #64748b;
            --radius: 16px; --shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        html, body { height: 100%; overflow: hidden; }
        body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; touch-action: none; padding-top: env(safe-area-inset-top, 0px); }

        /* ─── TOP BAR ─── */
        .top-bar { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: var(--surface); box-shadow: 0 2px 12px rgba(0,0,0,0.06); z-index: 100; flex-shrink: 0; min-height: 52px; }
        .top-btn { width: 44px; height: 44px; border: none; border-radius: 12px; background: #f1f5f9; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.15s, background 0.15s; flex-shrink: 0; }
        .top-btn:active { transform: scale(0.9); background: #e2e8f0; }
        .page-title { flex: 1; text-align: center; font-weight: 800; font-size: 18px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* ─── CANVAS AREA ─── */
        .canvas-wrap { flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; background: var(--bg); }
        #colorCanvas { background: #ffffff; border-radius: 12px; box-shadow: var(--shadow); touch-action: none; max-width: calc(100% - 24px); max-height: 100%; }

        /* ─── COLOR PALETTE ─── */
        .palette-bar { display: flex; align-items: center; gap: 6px; padding: 8px 10px; padding-bottom: env(safe-area-inset-bottom, 8px); background: var(--surface); box-shadow: 0 -2px 12px rgba(0,0,0,0.06); overflow-x: auto; overflow-y: hidden; flex-shrink: 0; z-index: 100; -webkit-overflow-scrolling: touch; }
        .palette-bar::-webkit-scrollbar { display: none; }
        .color-btn { width: 52px; height: 52px; border-radius: 50%; border: 3px solid transparent; cursor: pointer; flex-shrink: 0; transition: transform 0.15s, border-color 0.15s; position: relative; }
        .color-btn:active { transform: scale(0.88); }
        .color-btn.selected { border-color: var(--text); transform: scale(1.12); box-shadow: 0 0 0 3px rgba(99,102,241,0.3); }
        .color-btn.white-swatch { border-color: #e2e8f0; }
        .color-btn.white-swatch.selected { border-color: var(--text); }

        /* ─── PAGE SELECTOR OVERLAY ─── */
        .page-selector { position: fixed; inset: 0; background: var(--bg); z-index: 200; display: flex; flex-direction: column; transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1); }
        .page-selector.open { transform: translateY(0); }
        .ps-header { display: flex; align-items: center; padding: 12px 16px; background: var(--surface); box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
        .ps-header h2 { flex: 1; font-size: 20px; font-weight: 800; }
        .ps-body { flex: 1; overflow-y: auto; padding: 16px; -webkit-overflow-scrolling: touch; }
        .ps-category { margin-bottom: 20px; }
        .ps-category h3 { font-size: 16px; font-weight: 700; color: var(--text2); margin-bottom: 10px; padding-left: 4px; }
        .ps-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; }
        .ps-thumb { background: var(--surface); border-radius: 16px; padding: 12px 8px; text-align: center; cursor: pointer; box-shadow: var(--shadow); transition: transform 0.15s; border: 3px solid transparent; }
        .ps-thumb:active { transform: scale(0.94); }
        .ps-thumb.current { border-color: var(--primary); }
        .ps-thumb .emoji { font-size: 42px; display: block; margin-bottom: 4px; }

        /* ─── CELEBRATION OVERLAY ─── */
        .celebration { position: fixed; inset: 0; z-index: 300; pointer-events: none; display: none; }
        .celebration.active { display: block; }
        .confetti { position: absolute; width: 10px; height: 10px; border-radius: 2px; animation: confetti-fall linear forwards; }
        @keyframes confetti-fall { 0% { transform: translateY(-20px) rotate(0deg); opacity: 1; } 100% { transform: translateY(110vh) rotate(720deg); opacity: 0; } }
        .celeb-text { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 64px; animation: celeb-pop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @keyframes celeb-pop { 0% { transform: translate(-50%,-50%) scale(0); } 100% { transform: translate(-50%,-50%) scale(1); } }
    </style>
</head>

<script>
/* ══════════════════════════════════════════════════════════════
   COLORING BOOK — BabyPath
   Zone-based coloring for toddlers (ages 1-4)
   ══════════════════════════════════════════════════════════════ */

// ─── AUDIO ENGINE ───
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function ensureAudio() { if (!audioCtx) audioCtx = new AudioCtx(); }

function playFillSound(color) {
    ensureAudio();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    // Map color index to a pleasant note
    const notes = [262,294,330,349,392,440,494,523,587,659,698,784,349,440];
    const idx = COLORS.indexOf(color);
    o.frequency.value = notes[idx % notes.length] || 440;
    o.type = 'triangle';
    g.gain.setValueAtTime(0.18, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);
    o.start(); o.stop(audioCtx.currentTime + 0.25);
}

function playCelebrationSound() {
    ensureAudio();
    [0, 150, 300, 450, 600].forEach((delay, i) => {
        setTimeout(() => {
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.connect(g); g.connect(audioCtx.destination);
            o.frequency.value = [523, 659, 784, 988, 1047][i];
            o.type = 'sine';
            g.gain.setValueAtTime(0.15, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.35);
            o.start(); o.stop(audioCtx.currentTime + 0.35);
        }, delay);
    });
}

// ─── COLORS ───
const COLORS = [
    '#EF4444','#F97316','#FACC15','#4ADE80','#16A34A','#38BEF8',
    '#2563EB','#8B5CF6','#EC4899','#92400E','#1E293B','#FFFFFF','#FDBA9B','#94A3B8'
];
const COLOR_NAMES = [
    'Red','Orange','Yellow','L.Green','D.Green','L.Blue',
    'D.Blue','Purple','Pink','Brown','Black','White','Peach','Gray'
];

// ─── CANVAS SETUP ───
const canvas = document.getElementById('colorCanvas');
const ctx = canvas.getContext('2d');
const W = 600, H = 700;
canvas.width = W; canvas.height = H;

let selectedColor = COLORS[0];
let currentPageIdx = 0;
let history = []; // undo stack: { zoneId, prevColor }

// ─── STATE ───
let zoneColors = {}; // zoneId -> color (null = unfilled/white)

function saveState() {
    const filled = {};
    Object.entries(zoneColors).forEach(([k, v]) => { if (v) filled[k] = v; });
    localStorage.setItem('cb_page_' + currentPageIdx, JSON.stringify(filled));
    localStorage.setItem('cb_current', currentPageIdx);
}

function loadPageState(idx) {
    const saved = localStorage.getItem('cb_page_' + idx);
    zoneColors = {};
    if (saved) {
        const parsed = JSON.parse(saved);
        Object.entries(parsed).forEach(([k, v]) => { zoneColors[k] = v; });
    }
}

// ─── HELPER: build Path2D from drawing commands ───
function makePath(fn) {
    const p = new Path2D();
    fn(p);
    return p;
}

// Shortcut for ellipse
function ellipse(p, cx, cy, rx, ry) {
    p.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
}

// Shortcut for rounded rect
function rRect(p, x, y, w, h, r) {
    p.moveTo(x + r, y);
    p.lineTo(x + w - r, y); p.quadraticCurveTo(x + w, y, x + w, y + r);
    p.lineTo(x + w, y + h - r); p.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    p.lineTo(x + r, y + h); p.quadraticCurveTo(x, y + h, x, y + h - r);
    p.lineTo(x, y + r); p.quadraticCurveTo(x, y, x + r, y);
    p.closePath();
}

/* ══════════════════════════════════════════════════════════════
   RENDERING
   ══════════════════════════════════════════════════════════════ */

function getPage() { return PAGES[currentPageIdx]; }

function drawPage() {
    const page = getPage();
    ctx.clearRect(0, 0, W, H);
    // Fill background white
    ctx.fillStyle = '#FFFFFF';
    ctx.fillRect(0, 0, W, H);

    // Draw each zone fill
    page.zones.forEach(zone => {
        const color = zoneColors[zone.id] || '#FFFFFF';
        ctx.fillStyle = color;
        ctx.fill(zone.path);
    });

    // Draw all outlines on top (thick black lines)
    ctx.strokeStyle = '#1E293B';
    ctx.lineWidth = 3.5;
    ctx.lineJoin = 'round';
    ctx.lineCap = 'round';
    page.zones.forEach(zone => {
        ctx.stroke(zone.path);
    });
}

/* ══════════════════════════════════════════════════════════════
   INTERACTION — tap/click to fill zone
   ══════════════════════════════════════════════════════════════ */

function getCanvasPoint(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = W / rect.width;
    const scaleY = H / rect.height;
    let clientX, clientY;
    if (e.touches && e.touches.length) {
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
    } else {
        clientX = e.clientX;
        clientY = e.clientY;
    }
    return {
        x: (clientX - rect.left) * scaleX,
        y: (clientY - rect.top) * scaleY
    };
}

function handleTap(e) {
    e.preventDefault();
    const pt = getCanvasPoint(e);
    const page = getPage();

    // Check zones in reverse order (topmost drawn last = highest priority)
    for (let i = page.zones.length - 1; i >= 0; i--) {
        const zone = page.zones[i];
        if (ctx.isPointInPath(zone.path, pt.x, pt.y)) {
            const prevColor = zoneColors[zone.id] || null;
            zoneColors[zone.id] = selectedColor;
            history.push({ zoneId: zone.id, prevColor });
            drawPage();
            playFillSound(selectedColor);
            saveState();
            checkCompletion();
            return;
        }
    }
}

canvas.addEventListener('pointerdown', handleTap, { passive: false });

function checkCompletion() {
    const page = getPage();
    const allFilled = page.zones.every(z => zoneColors[z.id] && zoneColors[z.id] !== '#FFFFFF');
    if (allFilled) {
        triggerCelebration();
    }
}

/* ══════════════════════════════════════════════════════════════
   CELEBRATION
   ══════════════════════════════════════════════════════════════ */

function triggerCelebration() {
    const el = document.getElementById('celebration');
    el.innerHTML = '';
    el.classList.add('active');

    // Confetti pieces
    const confettiColors = ['#EF4444','#FACC15','#4ADE80','#38BEF8','#8B5CF6','#EC4899','#F97316'];
    for (let i = 0; i < 60; i++) {
        const c = document.createElement('div');
        c.className = 'confetti';
        c.style.left = Math.random() * 100 + '%';
        c.style.top = '-10px';
        c.style.background = confettiColors[i % confettiColors.length];
        c.style.width = (6 + Math.random() * 10) + 'px';
        c.style.height = (6 + Math.random() * 10) + 'px';
        c.style.animationDuration = (2 + Math.random() * 2) + 's';
        c.style.animationDelay = (Math.random() * 0.8) + 's';
        c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        el.appendChild(c);
    }

    // Big emoji
    const txt = document.createElement('div');
    txt.className = 'celeb-text';
    txt.textContent = '🎉';
    el.appendChild(txt);

    playCelebrationSound();

    setTimeout(() => { el.classList.remove('active'); el.innerHTML = ''; }, 3500);
}

/* ══════════════════════════════════════════════════════════════
   PALETTE
   ══════════════════════════════════════════════════════════════ */

function buildPalette() {
    const bar = document.getElementById('palette');
    bar.innerHTML = '';
    COLORS.forEach((color, i) => {
        const btn = document.createElement('button');
        btn.className = 'color-btn' + (color === selectedColor ? ' selected' : '') + (color === '#FFFFFF' ? ' white-swatch' : '');
        btn.style.background = color;
        btn.title = COLOR_NAMES[i];
        btn.setAttribute('aria-label', COLOR_NAMES[i]);
        btn.addEventListener('pointerdown', (e) => {
            e.preventDefault();
            e.stopPropagation();
            selectedColor = color;
            bar.querySelectorAll('.color-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
        });
        bar.appendChild(btn);
    });
}

/* ══════════════════════════════════════════════════════════════
   PAGE SELECTOR
   ══════════════════════════════════════════════════════════════ */

function buildPageSelector() {
    const body = document.getElementById('pagesBody');
    body.innerHTML = '';
    const categories = ['Animals', 'Letters', 'Shapes', 'Nature'];
    categories.forEach(cat => {
        const pages = PAGES.map((p, i) => ({ ...p, idx: i })).filter(p => p.category === cat);
        if (!pages.length) return;

        const sec = document.createElement('div');
        sec.className = 'ps-category';

        const catEmojis = { Animals: '🐾', Letters: '🔤', Shapes: '🔷', Nature: '🌿' };
        const h3 = document.createElement('h3');
        h3.textContent = (catEmojis[cat] || '') + ' ' + cat;
        sec.appendChild(h3);

        const grid = document.createElement('div');
        grid.className = 'ps-grid';

        pages.forEach(pg => {
            const thumb = document.createElement('div');
            thumb.className = 'ps-thumb' + (pg.idx === currentPageIdx ? ' current' : '');

            // Check if page is complete
            const saved = localStorage.getItem('cb_page_' + pg.idx);
            let complete = false;
            if (saved) {
                const parsed = JSON.parse(saved);
                complete = pg.zones.every(z => parsed[z.id] && parsed[z.id] !== '#FFFFFF');
            }
            // Also check current page live state
            if (pg.idx === currentPageIdx) {
                complete = pg.zones.every(z => zoneColors[z.id] && zoneColors[z.id] !== '#FFFFFF');
            }

            thumb.innerHTML = `<span class="emoji">${pg.emoji}</span><span class="label">${pg.name}</span>${complete ? '<span class="done-badge">✓ Done</span>' : ''}`;
            thumb.addEventListener('click', () => {
                saveState();
                currentPageIdx = pg.idx;
                loadPageState(currentPageIdx);
                history = [];
                drawPage();
                updateTitle();
                closePagesPanel();
            });
            grid.appendChild(thumb);
        });

        sec.appendChild(grid);
        body.appendChild(sec);
    });
}

function openPagesPanel() {
    buildPageSelector();
    document.getElementById('pageSelector').classList.add('open');
}
function closePagesPanel() {
    document.getElementById('pageSelector').classList.remove('open');
}

function updateTitle() {
    const page = getPage();
    document.getElementById('pageTitle').textContent = page.emoji + ' ' + page.name;
}

/* ══════════════════════════════════════════════════════════════
   TOOLBAR BUTTONS
   ══════════════════════════════════════════════════════════════ */

document.getElementById('btnPages').addEventListener('click', openPagesPanel);
document.getElementById('btnClosePages').addEventListener('click', closePagesPanel);

document.getElementById('btnUndo').addEventListener('click', () => {
    if (!history.length) return;
    const action = history.pop();
    if (action.prevColor) {
        zoneColors[action.zoneId] = action.prevColor;
    } else {
        delete zoneColors[action.zoneId];
    }
    drawPage();
    saveState();
});

document.getElementById('btnClear').addEventListener('click', () => {
    const page = getPage();
    page.zones.forEach(z => { delete zoneColors[z.id]; });
    history = [];
    drawPage();
    saveState();
});

document.getElementById('btnSave').addEventListener('click', () => {
    // Create a high-res export
    const exportCanvas = document.createElement('canvas');
    exportCanvas.width = W;
    exportCanvas.height = H;
    const ectx = exportCanvas.getContext('2d');
    const page = getPage();

    ectx.fillStyle = '#FFFFFF';
    ectx.fillRect(0, 0, W, H);

    page.zones.forEach(zone => {
        const color = zoneColors[zone.id] || '#FFFFFF';
        ectx.fillStyle = color;
        ectx.fill(zone.path);
    });

    ectx.strokeStyle = '#1E293B';
    ectx.lineWidth = 3.5;
    ectx.lineJoin = 'round';
    ectx.lineCap = 'round';
    page.zones.forEach(zone => {
        ectx.stroke(zone.path);
    });

    const link = document.createElement('a');
    link.download = 'coloring-' + page.name.toLowerCase().replace(/\s+/g, '-') + '.png';
    link.href = exportCanvas.toDataURL('image/png');
    link.click();
});

/* ══════════════════════════════════════════════════════════════
   RESIZE HANDLING
   ══════════════════════════════════════════════════════════════ */

function resizeCanvas() {
    const wrap = document.querySelector('.canvas-wrap');
    const maxW = wrap.clientWidth - 24;
    const maxH = wrap.clientHeight - 12;
    const aspect = W / H;

    let displayW, displayH;
    if (maxW / maxH > aspect) {
        displayH = maxH;
        displayW = maxH * aspect;
    } else {
        displayW = maxW;
        displayH = maxW / aspect;
    }

    canvas.style.width = displayW + 'px';
    canvas.style.height = displayH + 'px';
}

window.addEventListener('resize', resizeCanvas);

/* ══════════════════════════════════════════════════════════════
   INIT
   ══════════════════════════════════════════════════════════════ */

(function init() {
    // Restore last page
    const savedPage = localStorage.getItem('cb_current');
    if (savedPage !== null) {
        const idx = parseInt(savedPage, 10);
        if (idx >= 0 && idx < PAGES.length) currentPageIdx = idx;
    }

    loadPageState(currentPageIdx);
    buildPalette();
    updateTitle();
    resizeCanvas();
    drawPage();

    // Prevent iOS bounce/zoom
    document.addEventListener('touchmove', e => { if (e.target === canvas) e.preventDefault(); }, { passive: false });
})();
